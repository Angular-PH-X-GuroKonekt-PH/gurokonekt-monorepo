name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - production
jobs:
  build_and_deploy_platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install --force && npx nx run web:build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GUROKONEKT }}
          channelId: live
          target: gurokonekt-platform-production
          projectId: gurokonekt
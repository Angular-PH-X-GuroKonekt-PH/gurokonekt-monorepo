name: API Workflow

on:
  workflow_call:
    secrets:
      DATABASE_URL:
        required: true
    inputs:
      version:
        required: false
        type: string
        description: 'Version to release (optional)'
      skip_release:
        required: false
        type: boolean
        default: false
        description: 'Skip release step'
  workflow_dispatch:
    secrets:
      DATABASE_URL:
        required: true
    inputs:
      version:
        required: false
        type: string
        description: 'Version to release (optional)'
      skip_release:
        required: false
        type: boolean
        default: false
        description: 'Skip release step'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npx nx lint api

      - name: Build project
        run: npx nx build api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run tests
        continue-on-error: true
        run: npx nx test api || echo "No tests to run"

  # release:
  #   needs: build-and-test
  #   if: inputs.skip_release == false && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
  #   uses: ./.github/workflows/release-template.yaml
  #   secrets: inherit
  #   with:
  #     project_name: 'api'
  #     version: ${{ inputs.version }}
  deploy:
    needs: build-and-test
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      project_name: 'api'
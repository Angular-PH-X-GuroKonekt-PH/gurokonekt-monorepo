name: Detect Changes and Trigger Workflows

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
    types: [closed]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      web-changed: ${{ steps.filter.outputs.web }}
      api-changed: ${{ steps.filter.outputs.api }}
      landing-page-changed: ${{ steps.filter.outputs.landing-page }}
      models-changed: ${{ steps.filter.outputs.models }}
      ui-changed: ${{ steps.filter.outputs.ui }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'lib/ui/**'
              - 'lib/models/**'
            api:
              - 'apps/api/**'
              - 'lib/models/**'
            landing-page:
              - 'apps/landing-page/**'
            models:
              - 'lib/models/**'
            ui:
              - 'lib/ui/**'
          list-files: shell
      
      - name: Show detected changes
        run: |
          echo "## Detected Changes Summary"
          echo "Web changed: ${{ steps.filter.outputs.web }}"
          echo "API changed: ${{ steps.filter.outputs.api }}"
          echo "Landing Page changed: ${{ steps.filter.outputs.landing-page }}"
          echo "Models changed: ${{ steps.filter.outputs.models }}"
          echo "UI changed: ${{ steps.filter.outputs.ui }}"
  
  trigger-web:
    needs: detect-changes
    if: needs.detect-changes.outputs.web-changed == 'true'
    uses: ./.github/workflows/web-workflow.yaml
    # Option 1: Inherit all secrets (current approach - simpler but less explicit)
    # secrets: inherit
    
    # Option 2: Explicitly pass only the secrets needed (more secure and clear)
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_ID_WEB: ${{ secrets.RAILWAY_SERVICE_ID_WEB }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_SECRET: ${{ secrets.DOCKERHUB_SECRET }}
  
  trigger-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.api-changed == 'true'
    uses: ./.github/workflows/api-workflow.yaml
    # Option 1: Inherit all secrets (current approach - simpler but less explicit)
    # secrets: inherit
    
    # Option 2: Explicitly pass only the secrets needed (more secure and clear)
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_ID_API: ${{ secrets.RAILWAY_SERVICE_ID_API }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_SECRET: ${{ secrets.DOCKERHUB_SECRET }}
  
  trigger-landing-page:
    needs: detect-changes
    if: needs.detect-changes.outputs.landing-page-changed == 'true'
    uses: ./.github/workflows/landingpage-workflow.yaml
    # Option 1: Inherit all secrets (current approach - simpler but less explicit)
    # secrets: inherit
    
    # Option 2: Explicitly pass only the secrets needed (more secure and clear)
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_ID_LANDING_PAGE: ${{ secrets.RAILWAY_SERVICE_ID_LANDING_PAGE }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_SECRET: ${{ secrets.DOCKERHUB_SECRET }}


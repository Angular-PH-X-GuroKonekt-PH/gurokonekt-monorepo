name: Deploy

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Project name to deploy (e.g., api, landing-page)'
        required: true
        type: string
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/**'
      - 'Dockerfile*'
      - '.github/workflows/deploy.yml'

jobs:
  docker-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set project name
        id: set-project
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "PROJECT_NAME=${{ github.event.inputs.project_name }}" >> $GITHUB_OUTPUT
          else
            # Auto-detect project from changed files or use default
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^apps/' | head -1 | cut -d'/' -f2 || echo "api")
            echo "PROJECT_NAME=${CHANGED_FILES}" >> $GITHUB_OUTPUT
          fi
          echo "Project name: ${{ steps.set-project.outputs.PROJECT_NAME }}"

      - name: Determine Dockerfile
        id: dockerfile
        run: |
          PROJECT_NAME="${{ steps.set-project.outputs.PROJECT_NAME }}"
          if [ "$PROJECT_NAME" == "api" ]; then
            echo "DOCKERFILE=Dockerfileapi" >> $GITHUB_OUTPUT
          elif [ "$PROJECT_NAME" == "landing-page" ]; then
            echo "DOCKERFILE=Dockerfilessr" >> $GITHUB_OUTPUT
          else
            echo "DOCKERFILE=Dockerfile$PROJECT_NAME" >> $GITHUB_OUTPUT
          fi
          echo "Using Dockerfile: ${{ steps.dockerfile.outputs.DOCKERFILE }}"

      - name: Determine Railway Service ID
        id: railway-service
        run: |
          PROJECT_NAME="${{ steps.set-project.outputs.PROJECT_NAME }}"
          if [ "$PROJECT_NAME" == "api" ]; then
            echo "RAILWAY_SERVICE_ID=${{ secrets.RAILWAY_SERVICE_ID_API }}" >> $GITHUB_OUTPUT
          elif [ "$PROJECT_NAME" == "landing-page" ]; then
            echo "RAILWAY_SERVICE_ID=${{ secrets.RAILWAY_SERVICE_ID_LANDING_PAGE }}" >> $GITHUB_OUTPUT
          elif [ "$PROJECT_NAME" == "web" ]; then
            echo "RAILWAY_SERVICE_ID=${{ secrets.RAILWAY_SERVICE_ID_WEB }}" >> $GITHUB_OUTPUT
          else
            echo "Error: No Railway service ID configured for project: $PROJECT_NAME"
            echo "RAILWAY_SERVICE_ID=" >> $GITHUB_OUTPUT
          fi
          echo "Railway Service ID determined for project: $PROJECT_NAME"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_SECRET }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.DOCKERFILE }}
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/gurokonek-${{ steps.set-project.outputs.PROJECT_NAME }}:latest,${{ secrets.DOCKERHUB_USERNAME }}/gurokonek-${{ steps.set-project.outputs.PROJECT_NAME }}:${{ github.sha }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          SERVICE_ID="${{ steps.railway-service.outputs.RAILWAY_SERVICE_ID }}"
          if [ -z "$SERVICE_ID" ]; then
            echo "Error: Railway service ID not found for project: ${{ steps.set-project.outputs.PROJECT_NAME }}"
            echo "Please ensure the secret RAILWAY_SERVICE_ID_<PROJECT_NAME> is set in GitHub secrets"
            exit 1
          fi
          echo "Deploying to Railway service: $SERVICE_ID"
          railway redeploy --service "$SERVICE_ID" -y
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}


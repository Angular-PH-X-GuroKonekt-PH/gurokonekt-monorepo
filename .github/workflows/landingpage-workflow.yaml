name: Landing Page Workflow

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        description: 'Version to release (optional)'
      skip_release:
        required: false
        type: boolean
        default: false
        description: 'Skip release step'
  workflow_dispatch:
    inputs:
      version:
        required: false
        type: string
        description: 'Version to release (optional)'
      skip_release:
        required: false
        type: boolean
        default: false
        description: 'Skip release step'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npx nx lint landing-page
      
      - name: Build project
        run: npx nx build landing-page
  
  release:
    needs: build-and-test
    if: inputs.skip_release == false && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
    uses: ./.github/workflows/release-template.yaml
    secrets: inherit
    with:
      project_name: 'landing-page'
      version: ${{ inputs.version }}
  deploy:
    needs: release
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      project_name: 'landing-page'

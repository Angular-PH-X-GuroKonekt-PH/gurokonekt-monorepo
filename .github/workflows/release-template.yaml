name: Release Template

on:
  workflow_call:
    secrets:
      GITHUB_TOKEN:
        required: true
    inputs:
      project_name:
        required: true
        type: string
        description: 'Name of the project to release'
      version:
        required: false
        type: string
        description: 'Version to release (optional). If not provided, Nx will auto-determine from conventional commits'
      tag_prefix:
        required: false
        type: string
        default: 'v'
        description: 'Prefix for git tags'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:

<aside class="fixed top-0 left-0 z-50 w-64 h-full transition-transform -translate-x-full sm:translate-x-0" aria-label="Sidebar">
  <div class="flex h-full flex-col overflow-y-auto border-e border-gray-200 bg-gray-50 px-3 py-4">

    <!-- Logo -->
    <a routerLink="/dashboard" class="flex items-center ps-2.5 mb-2 justify-start">
      <img src="assets/logos/logo-light.svg" class="h-12 me-1" alt="GuroKonekt Logo" />
      <div class="flex items-center justify-center gap-1">
        <span class="text-xl font-bold text-blue-900">Guro</span>
        <span class="text-xl font-bold text-orange-500">Konekt</span>
      </div>
    </a>

    <p class="px-4 mb-3 text-xs font-semibold uppercase tracking-wider text-gray-400">Admin Portal</p>

    <!-- Top Nav -->
    <ul class="space-y-2 px-4 font-medium">
      @for (item of navItems(); track item.route) {
        <li>
          <a
            [routerLink]="item.route"
            routerLinkActive="bg-orange-50 text-orange-600 border-l-4 border-orange-500"
            [routerLinkActiveOptions]="{ exact: false }"
            class="flex items-center gap-3 px-4 py-3 text-gray-600 font-medium rounded-lg hover:bg-gray-100 hover:text-gray-900 transition-all group relative"
          >
            <app-icon [name]="asIconName(item.icon)" class="h-5 w-5 transition-transform group-hover:scale-110" />
            <span class="truncate">{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>

    <!-- Bottom Nav -->
    @if (bottomNavItems().length) {
      <div class="mt-auto px-4 pb-2">
        <div class="border-t border-gray-200 pt-4">
          <ul class="space-y-2 font-medium">
            @for (item of bottomNavItems(); track item.route) {
              <li>
                <a
                  [routerLink]="item.route"
                  routerLinkActive="bg-orange-50 text-orange-600 border-l-4 border-orange-500"
                  [routerLinkActiveOptions]="{ exact: false }"
                  class="flex items-center gap-3 px-4 py-3 text-gray-600 font-medium rounded-lg hover:bg-gray-100 hover:text-gray-900 transition-all group relative"
                >
                  <app-icon [name]="asIconName(item.icon)" class="h-5 w-5 transition-transform group-hover:scale-110" />
                  <span class="truncate">{{ item.label }}</span>
                </a>
              </li>
            }
          </ul>
        </div>
      </div>
    }

  </div>
</aside>

<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl">

    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
      <h2 class="text-lg font-semibold text-gray-900">Reject Mentor Account</h2>
      <button type="button" (click)="close()" class="text-gray-400 hover:text-gray-600 transition-colors">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="px-6 py-4 space-y-4">
      <p class="text-sm text-gray-600">
        You are about to reject <span class="font-semibold text-gray-900">{{ mentor().firstName }} {{ mentor().lastName }}</span>'s mentor application.
        Please provide a reason.
      </p>

      <div>
        <label for="reject-reason" class="block text-sm font-medium text-gray-700 mb-1">
          Reason <span class="text-red-500">*</span>
        </label>
        <textarea
          id="reject-reason"
          [ngModel]="reason()"
          (ngModelChange)="reason.set($event)"
          (blur)="touched.set(true)"
          rows="4"
          placeholder="Explain why this application is being rejected (minimum 10 characters)..."
          class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 resize-none"
          [class.border-red-400]="touched() && !isValid"
          [class.border-gray-300]="!touched() || isValid"
        ></textarea>
        @if (touched() && !isValid) {
          <p class="mt-1 text-xs text-red-500">Reason must be at least 10 characters.</p>
        }
        <p class="mt-1 text-xs text-gray-400">{{ reason().trim().length }} / 10 min</p>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex gap-3 px-6 py-4 border-t border-gray-200">
      <button type="button" (click)="close()"
        class="flex-1 py-2 px-4 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium rounded-lg transition-colors">
        Cancel
      </button>
      <button type="button" (click)="onConfirm()" [disabled]="submitting()"
        class="flex-1 py-2 px-4 bg-red-600 hover:bg-red-700 disabled:opacity-50 text-white text-sm font-medium rounded-lg transition-colors">
        {{ submitting() ? 'Rejecting...' : 'Reject Account' }}
      </button>
    </div>

  </div>
</div>

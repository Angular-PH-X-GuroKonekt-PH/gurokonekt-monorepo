<div class="bg-white rounded-xl border border-gray-200 p-5">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
    <h2 class="text-base font-semibold text-gray-800">Platform Growth</h2>
    <div class="flex items-center gap-2">
      <select
        [value]="period()"
        (change)="onPeriodChange($any($event.target).value)"
        class="rounded-lg border border-gray-300 px-2.5 py-1.5 text-xs text-gray-700 focus:border-orange-400 focus:outline-none focus:ring-1 focus:ring-orange-400"
        aria-label="Select period"
      >
        @for (p of periods; track p.value) {
          <option [value]="p.value">{{ p.label }}</option>
        }
      </select>
      <select
        [value]="window()"
        (change)="onWindowChange($any($event.target).value)"
        class="rounded-lg border border-gray-300 px-2.5 py-1.5 text-xs text-gray-700 focus:border-orange-400 focus:outline-none focus:ring-1 focus:ring-orange-400"
        aria-label="Select time window"
      >
        @for (w of windows; track w.value) {
          <option [value]="w.value">{{ w.label }}</option>
        }
      </select>
    </div>
  </div>

  <div class="relative h-64">
    @if (loading()) {
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="h-8 w-8 animate-spin rounded-full border-4 border-orange-500 border-t-transparent"></div>
      </div>
    }
    @if (error()) {
      <div class="absolute inset-0 flex items-center justify-center text-sm text-red-500">{{ error() }}</div>
    }
    <canvas #chartCanvas [class.invisible]="loading() || !!error()"></canvas>
  </div>
</div>

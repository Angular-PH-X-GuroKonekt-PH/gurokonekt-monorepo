<section
  class="min-h-screen bg-gradient-to-br from-blue-50 via-orange-50 to-blue-50 py-8 sm:py-12"
>
  <div class="mx-auto max-w-6xl px-2 sm:px-4 lg:px-6">
    <div class="mb-8 text-center">
      <img
        src="assets/logos/logo-light.svg"
        alt="GuroKonekt Logo"
        class="h-16 w-16 mx-auto"
      />
      <div class="mt-4 flex items-center justify-center gap-1">
        <span class="text-3xl font-bold text-blue-900">Guro</span>
        <span class="text-3xl font-bold text-orange-500">Konekt</span>
      </div>
    </div>

    <div
      class="mx-auto max-w-xl bg-white rounded-3xl shadow-xl border-2 border-gray-100 p-8 sm:p-10 lg:p-12"
    >
      <div class="space-y-6">
        <div class="text-center">
          <div
            class="mx-auto flex h-14 w-14 items-center justify-center rounded-full"
            [class]="iconWrapperClass()"
          >
            <app-icon [name]="iconName()" [class]="iconClass()"></app-icon>
          </div>
          <h1 class="mt-5 text-2xl font-bold text-gray-900">{{ title() }}</h1>
          <ng-content select="[resultDescription]"></ng-content>
        </div>

        <ng-content select="[resultBody]"></ng-content>
        <ng-content select="[resultActions]"></ng-content>
      </div>
    </div>
  </div>
</section>

<app-email-verification-result-layout
  iconName="verified-badge"
  iconWrapperClass="bg-blue-100"
  iconClass="h-7 w-7 text-blue-600"
  title="Email already verified"
>
  <p resultDescription class="mt-3 text-sm text-gray-600 leading-relaxed">
    This email address has already been verified. No further action is needed to
    confirm your account.
  </p>

  <div
    resultBody
    class="rounded-xl border border-blue-200 border-l-4 border-l-blue-500 bg-blue-50 p-5 text-sm text-gray-700"
  >
    <p class="font-medium text-blue-900">What this means</p>
    <p class="mt-2 leading-relaxed">
      You may have clicked an older verification link after confirming your email.
      Sign in with your email and password to continue using GuroKonekt.
    </p>
  </div>

  <div resultActions class="pt-4 flex justify-end">
    <button
      type="button"
      (click)="navigateToLogin()"
      (keyup.enter)="navigateToLogin()"
      (keyup.space)="navigateToLogin()"
      class="inline-flex items-center gap-1.5 rounded-lg bg-orange-500 px-4 py-2 text-sm font-semibold text-white transition-colors hover:bg-orange-600"
    >
      Go to Login
      <app-icon name="chevron-right" class="w-4 h-4"></app-icon>
    </button>
  </div>
</app-email-verification-result-layout>

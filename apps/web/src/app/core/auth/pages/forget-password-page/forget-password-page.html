<section class="min-h-screen bg-gradient-to-br from-blue-50 via-orange-50 to-blue-50 py-16">
    <div class="mx-auto max-w-xl px-4 sm:px-6 lg:px-8">
        <div class="mb-12 text-center">
            <img ngSrc="assets/logos/logo-light.svg" width="64" height="64" priority alt="GuroKonekt Logo"
                class="h-16 w-16 mx-auto" />
            <div class="mt-4 flex items-center justify-center gap-1">
                <span class="text-3xl font-bold text-blue-900">Guro</span>
                <span class="text-3xl font-bold text-orange-500">Konekt</span>
            </div>
        </div>

        <div class="text-center mb-8">
            <h1
                class="text-3xl sm:text-4xl font-bold bg-gradient-to-r from-blue-900 via-orange-600 to-blue-900 bg-clip-text text-transparent">
                Forgot Password
            </h1>
            <p class="mt-3 text-base text-gray-700 mx-auto max-w-sm">
                Enter your email address to receive a reset link and regain access to your account.
            </p>
        </div>

        <div class="mx-auto w-full max-w-lg bg-white rounded-3xl shadow-xl border-2 border-gray-100 p-8 sm:p-10">
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

                <div class="mb-8">
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">
                        Email Address
                    </label>
                    <input type="email" id="email" formControlName="email" aria-label="Email Address"
                        [attr.aria-invalid]="hasError('email')"
                        [attr.aria-describedby]="hasError('email') ? 'email-error' : null" class="form-control-input"
                        [class.border-red-500]="hasError('email')" placeholder="your.email@example.com" />
                    @if (hasError('email')) {
                    <p id="email-error" class="mt-1 text-sm text-red-600">
                        {{ getErrorMessage('email') }}
                    </p>
                    }
                </div>

                <button type="submit" class="w-full btn-gradient-primary disabled:transform-none"
                    [disabled]="selectSignal.isLoginLoading()">
                    @if (selectSignal.isLoginLoading()) {
                    <span class="inline-flex items-center gap-2">
                        <span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                        Sending...
                    </span>
                    } @else {
                        <span>Send Reset Link</span>
                    }
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-gray-600">
                    Already have an account? 
                    <button type="button" (click)="navigateToLogin()"
                        class="text-orange-600 hover:text-orange-700 font-semibold ml-1">
                        Login
                    </button>
                </p>
            </div>
        </div>
    </div>
</section>

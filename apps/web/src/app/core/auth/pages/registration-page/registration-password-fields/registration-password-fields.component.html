<div class="flex flex-col gap-6">
  <div class="text-center">
    <h2 class="text-2xl font-bold text-gray-900">Account Security</h2>
    <p class="text-gray-600 mt-2">{{ subtitle() }}</p>
  </div>

  <div>
    <label
      for="password"
      class="block text-sm font-semibold text-gray-700 mb-2"
    >
      Password <span class="text-orange-500">*</span>
    </label>
    <div class="relative">
      <input
        [type]="showPassword() ? 'text' : 'password'"
        id="password"
        formControlName="password"
        class="form-control-input form-control-input-with-icon"
        [class.border-red-500]="hasFieldError('password')"
        placeholder="••••••••"
      />
      <button
        type="button"
        (click)="togglePasswordVisibility()"
        (keyup.enter)="togglePasswordVisibility()"
        (keyup.space)="togglePasswordVisibility()"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
        [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
      >
        @if (showPassword()) {
        <app-icon name="eye-off" class="h-5 w-5"></app-icon>
        } @else {
        <app-icon name="eye" class="h-5 w-5"></app-icon>
        }
      </button>
    </div>
    @if (hasFieldError('password')) {
    <p class="mt-1 text-sm text-red-600">
      {{ getFieldErrorMessage('password') }}
    </p>
    } @else {
    <p class="mt-1 text-xs text-gray-600">
      Min 8 characters with uppercase, number & special character
    </p>
    }
  </div>

  <div>
    <label
      for="confirmPassword"
      class="block text-sm font-semibold text-gray-700 mb-2"
    >
      Confirm Password <span class="text-orange-500">*</span>
    </label>
    <div class="relative">
      <input
        [type]="showConfirmPassword() ? 'text' : 'password'"
        id="confirmPassword"
        formControlName="confirmPassword"
        class="form-control-input form-control-input-with-icon"
        [class.border-red-500]="
          hasFieldError('confirmPassword') || form().hasError('passwordMismatch')
        "
        placeholder="••••••••"
      />
      <button
        type="button"
        (click)="toggleConfirmPasswordVisibility()"
        (keyup.enter)="toggleConfirmPasswordVisibility()"
        (keyup.space)="toggleConfirmPasswordVisibility()"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
        [attr.aria-label]="
          showConfirmPassword()
            ? 'Hide confirm password'
            : 'Show confirm password'
        "
      >
        @if (showConfirmPassword()) {
        <app-icon name="eye-off" class="h-5 w-5"></app-icon>
        } @else {
        <app-icon name="eye" class="h-5 w-5"></app-icon>
        }
      </button>
    </div>
    @if (hasPasswordMismatch()) {
    <p class="mt-1 text-sm text-red-600">Passwords do not match</p>
    }
  </div>
</div>

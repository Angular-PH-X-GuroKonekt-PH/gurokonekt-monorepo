<div class="text-center">
  <h2 class="text-2xl font-bold text-gray-900">{{ title() }}</h2>
  <p class="text-gray-600 mt-2">{{ subtitle() }}</p>
</div>

<ng-content />

@if (termsVariant() === 'emphasized') {
<div class="bg-orange-50 border-2 border-orange-200 rounded-xl p-6">
  <label class="flex items-start gap-3 cursor-pointer">
    <input
      type="checkbox"
      formControlName="acceptTerms"
      class="mt-1 w-5 h-5 rounded border-2 border-gray-300 text-orange-500 focus:ring-2 focus:ring-orange-500"
    />
    <span class="text-sm text-gray-700">
      {{ termsLead() }}
      <a
        href="#"
        class="text-orange-600 hover:text-orange-700 font-semibold"
        >Terms & Conditions</a
      >
      and
      <a
        href="#"
        class="text-orange-600 hover:text-orange-700 font-semibold"
        >Privacy Policy</a
      >
      <span class="text-orange-500">*</span>
    </span>
  </label>
  @if (hasAcceptTermsError()) {
  <p class="mt-2 text-sm text-red-600">
    You must accept the terms and conditions to proceed
  </p>
  }
</div>
} @else {
<div>
  <label class="flex items-start gap-3 cursor-pointer">
    <input
      type="checkbox"
      formControlName="acceptTerms"
      class="mt-1 w-5 h-5 rounded border-2 border-gray-300 text-orange-500 focus:ring-2 focus:ring-orange-500"
    />
    <span class="text-sm text-gray-700">
      {{ termsLead() }}
      <a
        href="#"
        class="text-orange-600 hover:text-orange-700 font-semibold"
      >
        Terms & Conditions
      </a>
      and
      <a
        href="#"
        class="text-orange-600 hover:text-orange-700 font-semibold"
      >
        Privacy Policy
      </a>
      <span class="text-orange-500">*</span>
    </span>
  </label>
  @if (hasAcceptTermsError()) {
  <p class="mt-1 text-sm text-red-600">
    You must accept the terms and conditions
  </p>
  }
</div>
}

<div (keydown.escape)="closePhoneCountryDropdown()">
  <label
    for="phoneNumber"
    class="block text-sm font-semibold text-gray-700 mb-2"
  >
    Phone Number <span class="text-orange-500">*</span>
  </label>
  <div class="relative">
    <div class="absolute left-0 top-0 h-full z-10">
      <button
        type="button"
        (click)="togglePhoneCountryDropdown()"
        (keyup.enter)="togglePhoneCountryDropdown()"
        (keyup.space)="togglePhoneCountryDropdown()"
        class="flex items-center gap-2 h-full px-4 border-r-2 border-gray-200 bg-gray-50 rounded-l-xl hover:bg-gray-100 transition-colors focus:outline-none focus:ring-2 focus:ring-orange-500 min-w-[7rem]"
        [attr.aria-label]="
          'Select country code, currently ' + getSelectedPhoneCountry().label
        "
      >
        <span class="text-xl leading-none">{{
          getSelectedPhoneCountry().flag
        }}</span>
        <span
          class="text-sm font-medium text-gray-700 whitespace-nowrap leading-none"
          >{{ getSelectedPhoneCountry().phoneCode }}</span
        >
        <app-icon
          name="chevron-down"
          class="w-4 h-4 text-gray-400 flex-shrink-0"
        ></app-icon>
      </button>

      @if (showPhoneCountryDropdown()) {
      <div
        class="absolute top-full left-0 z-50 w-80 max-h-60 overflow-y-auto bg-white border-2 border-gray-200 rounded-xl shadow-lg mt-1"
      >
        @for (country of countries; track country.value) {
        <button
          type="button"
          (click)="selectPhoneCountry(country.value)"
          (keyup.enter)="selectPhoneCountry(country.value)"
          (keyup.space)="selectPhoneCountry(country.value)"
          class="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors text-left focus:outline-none focus:bg-orange-50"
          [class.bg-orange-50]="selectedPhoneCountry() === country.value"
          [class.border-l-4]="selectedPhoneCountry() === country.value"
          [class.border-l-orange-500]="selectedPhoneCountry() === country.value"
        >
          <span class="text-xl">{{ country.flag }}</span>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium text-gray-900 truncate">
              {{ country.label }}
            </div>
            <div class="text-xs text-gray-500">
              {{ country.phoneCode }}
            </div>
          </div>
        </button>
        }
      </div>
      }
    </div>

    <input
      type="tel"
      id="phoneNumber"
      formControlName="phoneNumber"
      class="w-full pl-32 pr-4 py-3 rounded-xl border-2 border-gray-200 focus:border-orange-500 focus:outline-none transition-colors"
      [class.border-red-500]="hasPhoneError()"
      [placeholder]="getPhoneFormatPlaceholder()"
      (focus)="closePhoneCountryDropdown()"
    />
  </div>
  @if (hasPhoneError()) {
  <p class="mt-1 text-sm text-red-600">
    {{ getPhoneErrorMessage() }}
  </p>
  }
</div>

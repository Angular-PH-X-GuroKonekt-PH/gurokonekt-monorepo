<div
  class="relative w-full overflow-hidden rounded-4xl bg-linear-to-br from-slate-950 via-blue-950 to-indigo-900 p p-6 sm:p-8 md:py-7 md:px-10"
>
  <div class="pointer-events-none absolute inset-0 opacity-30">
    <div class="absolute -right-12 -top-12 h-56 w-56 rounded-full bg-orange-400/20 blur-3xl"></div>
    <div class="absolute bottom-0 right-1/4 h-72 w-72 rounded-full bg-blue-400/20 blur-3xl"></div>
    <div class="absolute left-0 top-1/3 h-64 w-64 rounded-full bg-indigo-300/10 blur-3xl"></div>
  </div>

  <div class="relative flex flex-col gap-8 md:flex-row md:items-center md:justify-between">
    <div class="flex flex-col items-start justify-start gap-6 md:max-w-2xl md:gap-4">
      <div>
        <p
          class="inline-flex items-center rounded-full bg-white/12 px-4 py-2 text-xs font-semibold uppercase tracking-[0.18em] text-white/85 sm:text-sm"
        >
          GuroKonekt
        </p>
      </div>

      <div class="space-y-2">
        <p class="font-bold leading-tight text-white text-[clamp(1.75rem,3vw,2rem)]">
          Welcome back, {{ name() }}!
          <br />
          <span class="hidden font-normal text-white/75 md:block text-[clamp(1rem,1.8vw,1rem)]">
            Grow Faster With Professional Mentorship
          </span>
        </p>
      </div>

      <div>
        <a
          [routerLink]="'/find-mentors'"
          class="inline-flex items-center gap-3 rounded-base bg-linear-to-r from-orange-500 via-orange-400 to-amber-400 px-5 py-2 font-medium text-white shadow-lg transition duration-300 hover:brightness-110 sm:px-6"
        >
          <span class="text-sm sm:text-base text-white">Find a Mentor</span>
          <span class="flex h-8 w-8 items-center justify-center rounded-full bg-white text-black">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-4"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
              />
            </svg>
          </span>
        </a>
      </div>
    </div>

    <div class="hidden md:flex md:shrink-0 md:items-center md:justify-center">
      <div class="flex h-33 w-33 items-center justify-center rounded-[2.5rem]  lg:h-44 lg:w-44 lg:p-10">
        <img
          src="assets/logos/logo.svg"
          alt="GuroKonekt logo"
          class="max-h-full max-w-full object-contain opacity-70"
        />
      </div>
    </div>


  </div>
</div>

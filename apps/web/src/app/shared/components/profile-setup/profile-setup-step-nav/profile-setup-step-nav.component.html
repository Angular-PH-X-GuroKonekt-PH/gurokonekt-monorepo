<div
  class="flex pt-6"
  [class]="currentStep() > 1 ? 'justify-between' : 'justify-end'"
>
  @if (currentStep() > 1) {
    <button
      type="button"
      (click)="previous.emit()"
      [disabled]="isLoading()"
      class="px-8 py-3 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
    >
      Back
    </button>
  }

  @if (currentStep() < totalSteps()) {
    <button
      type="button"
      (click)="next.emit()"
      [disabled]="!canProceed() || isLoading()"
      class="px-8 py-3 bg-orange-500 text-white rounded-lg font-semibold hover:bg-orange-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
    >
      {{ nextLabel() }}
    </button>
  } @else {
    <button
      type="submit"
      [disabled]="isLoading() || !canProceed()"
      class="px-8 py-3 bg-orange-500 text-white rounded-lg font-semibold hover:bg-orange-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
    >
      @if (isLoading()) {
        <svg
          class="animate-spin h-5 w-5 text-white"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
          ></path>
        </svg>
        {{ submitLoadingLabel() }}
      } @else {
        {{ submitLabel() }}
      }
    </button>
  }
</div>

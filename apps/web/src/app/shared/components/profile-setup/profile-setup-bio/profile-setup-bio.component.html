<div>
  <div class="block text-sm font-semibold text-gray-700 mb-2">
    {{ label() }} <span class="text-red-500">*</span>
  </div>
  <textarea
    formControlName="bio"
    rows="5"
    [placeholder]="placeholder()"
    class="w-full px-4 py-3 border-2 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-colors"
    [class.border-red-500]="hasBioError()"
  ></textarea>
  <div class="flex justify-between items-center mt-1">
    <span class="text-sm text-gray-500">
      {{ bioLength() }} / {{ maxLength() }} characters (min: {{ minLength() }})
    </span>
    @if (hasBioError()) {
      <span class="text-sm text-red-600">{{ getBioErrorMessage() }}</span>
    }
  </div>
</div>

<div>
  <div class="block text-sm font-semibold text-gray-700 mb-3">
    {{ label() }} <span class="text-red-500">*</span>
  </div>
  <p class="text-sm text-gray-600 mb-4">{{ description() }}</p>

  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
    @for (option of options(); track option) {
      <button
        type="button"
        (click)="toggled.emit(option)"
        [disabled]="isDisabled(option)"
        class="px-4 py-3 rounded-lg border-2 transition-all text-sm font-medium"
        [class]="
          isSelected()(option)
            ? 'bg-orange-500 text-white border-orange-500'
            : 'bg-white text-gray-700 border-gray-300 hover:border-orange-500 disabled:opacity-50 disabled:cursor-not-allowed'
        "
      >
        {{ option }}
      </button>
    }
  </div>

  @if (selectedCount() === 0) {
    <p class="text-sm text-red-600 mt-2">{{ emptyError() }}</p>
  }

  @if (showSelectedCount() && maxItems() !== null) {
    <p class="text-sm text-gray-500 mt-2">
      Selected: {{ selectedCount() }} / {{ maxItems() }}
    </p>
  }
</div>

<div class="mb-10">
  <div class="flex items-center justify-center max-w-3xl mx-auto">
    @for (stepTitle of stepTitles(); track $index) {
      <div class="flex flex-col items-center relative flex-1">
        <div
          class="relative flex items-center justify-center w-14 h-14 rounded-full border-2 transition-all duration-300 z-10 bg-white"
          [class]="
            currentStep() > $index + 1
              ? 'border-green-500 text-green-600'
              : currentStep() === $index + 1
                ? 'border-orange-500 bg-white text-orange-500 shadow-lg'
                : 'border-gray-300 text-gray-700'
          "
        >
          @if (currentStep() > $index + 1) {
            <app-icon name="check-mark" class="w-6 h-6 text-green-600"></app-icon>
          } @else {
            <span class="text-lg font-extrabold">{{ $index + 1 }}</span>
          }
        </div>

        @if ($index < stepTitles().length - 1) {
          <div
            class="absolute top-6 left-1/2 w-full h-0.5 -z-10"
            [class]="currentStep() > $index + 1 ? 'bg-green-500' : 'bg-gray-200'"
            style="transform: translateX(50%)"
          ></div>
        }

        <div class="mt-4 text-center max-w-32">
          <h3
            class="text-sm font-semibold leading-tight mb-1"
            [class]="
              currentStep() === $index + 1
                ? 'text-orange-600'
                : currentStep() > $index + 1
                  ? 'text-green-600'
                  : 'text-gray-500'
            "
          >
            {{ stepTitle }}
          </h3>
        </div>
      </div>
    }
  </div>
</div>

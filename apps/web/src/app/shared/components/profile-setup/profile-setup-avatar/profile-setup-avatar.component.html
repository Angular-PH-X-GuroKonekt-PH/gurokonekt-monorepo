<div class="flex flex-col items-center mb-8">
  <div class="relative">
    @if (previewUrl()) {
      <img
        [src]="previewUrl()"
        alt="Profile preview"
        class="w-32 h-32 rounded-full object-cover border-4 border-orange-500"
      />
      <button
        type="button"
        (click)="removed.emit(avatarInput)"
        class="absolute -top-2 -right-2 flex h-9 w-9 items-center justify-center rounded-full border border-red-100 bg-white text-red-500 shadow-md transition-colors hover:border-red-200 hover:bg-red-50 hover:text-red-600 focus:outline-none focus:ring-2 focus:ring-red-200"
      >
        <app-icon name="close" class="w-4 h-4"></app-icon>
      </button>
    } @else {
      <div
        class="w-32 h-32 rounded-full bg-gray-200 flex items-center justify-center border-4 border-dashed border-gray-300"
      >
        <app-icon name="user" class="w-12 h-12 text-gray-400"></app-icon>
      </div>
    }
  </div>

  <label class="mt-4 cursor-pointer">
    <span
      class="px-6 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 transition-colors inline-block"
    >
      {{ buttonLabel() }} <span class="text-red-200">*</span>
    </span>
    <input
      #avatarInput
      type="file"
      accept=".jpg,.jpeg,.png"
      (change)="fileSelected.emit($event)"
      class="hidden"
    />
  </label>

  <p class="text-sm text-gray-500 mt-2">{{ helperText() }}</p>

  @if (error()) {
    <p class="text-sm text-red-600 mt-2">{{ error() }}</p>
  }
</div>

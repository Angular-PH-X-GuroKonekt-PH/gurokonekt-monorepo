<section
  class="min-h-screen bg-gradient-to-br from-blue-50 via-orange-50 to-blue-50"
>
  <div class="mx-auto max-w-6xl px-4 py-16 sm:px-6 lg:px-8">
    <!-- Logo Section -->
    <div class="mb-12 text-center">
      <img src="assets/logos/logo-light.svg" alt="GuroKonekt Logo" class="h-20 w-20 mx-auto" />
      <div class="mt-4 flex items-center justify-center gap-1">
        <span class="text-4xl font-bold text-blue-900">Guro</span>
        <span class="text-4xl font-bold text-orange-500">Konekt</span>
      </div>
    </div>

    <!-- Header Section -->
    <div class="text-center max-w-3xl mx-auto mb-20">
      <p
        class="text-sm font-semibold uppercase tracking-[0.15em] text-orange-600"
      >
        Getting Started
      </p>
      <h1
        class="mt-6 text-4xl sm:text-5xl font-bold bg-gradient-to-r from-blue-900 via-orange-600 to-blue-900 bg-clip-text text-transparent"
      >
        Choose Your Path
      </h1>
      <p class="mt-8 text-lg text-gray-700">
        Whether you're seeking mentorship or ready to share your knowledge,
        there's a perfect role for you.
      </p>
    </div>

    <div class="grid gap-12 md:grid-cols-2 mb-20">
      <button
        type="button"
        class="group w-full rounded-3xl border-2 bg-white p-10 text-left shadow-lg transition duration-300 hover:-translate-y-3 hover:shadow-2xl flex flex-col h-full focus:outline-none focus:ring-2 focus:ring-orange-500 focus:ring-offset-2"
        [class.border-gray-100]="selectedRole() !== 'mentee'"
        [class.border-orange-300]="selectedRole() === 'mentee'"
        [class.bg-gradient-to-br]="selectedRole() === 'mentee'"
        [class.from-white]="selectedRole() === 'mentee'"
        [class.to-orange-50]="selectedRole() === 'mentee'"
        [class.ring-2]="selectedRole() === 'mentee'"
        [class.ring-offset-2]="selectedRole() === 'mentee'"
        [class.ring-orange-500]="selectedRole() === 'mentee'"
        [class.shadow-2xl]="selectedRole() === 'mentee'"
        (click)="selectRole('mentee')"
      >
        <div class="flex items-start justify-between gap-6 mb-10">
          <div class="flex-1">
            <span
              class="inline-block px-4 py-2 rounded-full bg-orange-100 text-xs font-bold uppercase tracking-wider text-orange-700 mb-4"
              >Mentee Path</span
            >
            <h2 class="text-3xl font-bold text-gray-900 mt-2">Learn & Grow</h2>
            <p class="mt-4 text-base text-gray-600 leading-relaxed">
              Get personalized guidance from experienced mentors and accelerate your professional growth.
            </p>
          </div>
          <span
            class="text-6xl group-hover:scale-125 transition-transform flex-shrink-0"
            ><app-icon name="book-open" class="h-12 w-12 text-orange-500"></app-icon></span
          >
        </div>
        <div class="flex-1 flex flex-col gap-6">
        <ul
          class="space-y-3 text-sm text-gray-700 bg-orange-50/50 rounded-xl p-5 flex-grow"
        >
          <li class="flex items-start gap-3">
            <span
              class="mt-0.5 flex h-5 w-5 items-center justify-center rounded-full bg-orange-500 text-white text-xs font-bold flex-shrink-0"
              >✓</span
            >
            <span class="font-medium"
              >Browse and book sessions with available mentors</span
            >
          </li>
          <li class="flex items-start gap-3">
            <span
              class="mt-0.5 flex h-5 w-5 items-center justify-center rounded-full bg-orange-500 text-white text-xs font-bold flex-shrink-0"
              >✓</span
            >
            <span class="font-medium"
              >View mentor availability and schedule meetings</span
            >
          </li>
          <li class="flex items-start gap-3">
            <span
              class="mt-0.5 flex h-5 w-5 items-center justify-center rounded-full bg-orange-500 text-white text-xs font-bold flex-shrink-0"
              >✓</span
            >
            <span class="font-medium"
              >Manage your upcoming mentorship sessions</span
            >
          </li>
        </ul>
        </div>
        <div class="mt-8 pt-6 border-t-2 border-orange-100">
          <div
            class="inline-flex items-center gap-3 rounded-full bg-orange-100 px-6 py-3 text-base font-semibold text-orange-700 transition-all"
            [class.bg-orange-600]="selectedRole() === 'mentee'"
            [class.text-white]="selectedRole() === 'mentee'"
            [class.ring-2]="selectedRole() === 'mentee'"
            [class.ring-offset-2]="selectedRole() === 'mentee'"
            [class.ring-orange-400]="selectedRole() === 'mentee'"
          >
            @if (selectedRole() !== 'mentee') {
            <span class="text-xl">→</span>
            } {{ selectedRole() === 'mentee' ? '✓ Selected' : 'Choose this path'
            }}
          </div>
        </div>
      </button>

      <button
        type="button"
        (click)="selectRole('mentor')"
        class="group w-full rounded-3xl border-2 bg-white p-10 text-left shadow-lg transition duration-300 hover:-translate-y-3 hover:shadow-2xl flex flex-col h-full focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2"
        [class.border-gray-100]="selectedRole() !== 'mentor'"
        [class.border-blue-300]="selectedRole() === 'mentor'"
        [class.bg-gradient-to-br]="selectedRole() === 'mentor'"
        [class.from-white]="selectedRole() === 'mentor'"
        [class.to-blue-50]="selectedRole() === 'mentor'"
        [class.ring-2]="selectedRole() === 'mentor'"
        [class.ring-offset-2]="selectedRole() === 'mentor'"
        [class.ring-blue-600]="selectedRole() === 'mentor'"
        [class.shadow-2xl]="selectedRole() === 'mentor'"
      >
        <div class="flex items-start justify-between gap-6 mb-10">
          <div class="flex-1">
            <span
              class="inline-block px-4 py-2 rounded-full bg-blue-100 text-xs font-bold uppercase tracking-wider text-blue-700 mb-4"
              >Mentor Path</span
            >
            <h2 class="text-3xl font-bold text-gray-900 mt-2">
              Lead & Inspire
            </h2>
            <p class="mt-4 text-base text-gray-600 leading-relaxed">
              Share your expertise, build meaningful relationships, and make a
              lasting impact on the next generation of professionals.
            </p>
          </div>
          <span
            class="text-6xl group-hover:scale-125 transition-transform flex-shrink-0"
            ><app-icon name="user-group" class="h-12 w-12 text-blue-500"></app-icon></span
          >
        </div>
        <div class="flex-1 flex flex-col gap-6">
        <ul
          class="space-y-3 text-sm text-gray-700 bg-blue-50/50 rounded-xl p-5 flex-grow"
        >
          <li class="flex items-start gap-3">
            <span
              class="mt-0.5 flex h-5 w-5 items-center justify-center rounded-full bg-blue-600 text-white text-xs font-bold flex-shrink-0"
              >✓</span
            >
            <span class="font-medium"
              >Set your availability and accept booking requests</span
            >
          </li>
          <li class="flex items-start gap-3">
            <span
              class="mt-0.5 flex h-5 w-5 items-center justify-center rounded-full bg-blue-600 text-white text-xs font-bold flex-shrink-0"
              >✓</span
            >
            <span class="font-medium"
              >Manage your mentorship session calendar</span
            >
          </li>
          <li class="flex items-start gap-3">
            <span
              class="mt-0.5 flex h-5 w-5 items-center justify-center rounded-full bg-blue-600 text-white text-xs font-bold flex-shrink-0"
              >✓</span
            >
            <span class="font-medium"
              >Connect with mentees through scheduled sessions</span
            >
          </li>
        </ul>
        </div>
        <div class="mt-8 pt-6 border-t-2 border-blue-100">
          <div
            class="inline-flex items-center gap-3 rounded-full bg-blue-100 px-6 py-3 text-base font-semibold text-blue-700 transition-all"
            [class.bg-blue-600]="selectedRole() === 'mentor'"
            [class.text-white]="selectedRole() === 'mentor'"
            [class.ring-2]="selectedRole() === 'mentor'"
            [class.ring-offset-2]="selectedRole() === 'mentor'"
            [class.ring-blue-400]="selectedRole() === 'mentor'"
          >
            @if (selectedRole() !== 'mentor') {
            <span class="text-xl">→</span>
            } {{ selectedRole() === 'mentor' ? '✓ Selected' : 'Choose this path'
            }}
          </div>
        </div>
      </button>
    </div>

    <!-- CTA Section -->
    <div
      class="mt-24 flex flex-col items-center gap-8 pt-16 border-t-2 border-gray-200"
    >
      <button
        type="button"
        class="rounded-full bg-gradient-to-r from-orange-500 to-orange-400 px-8 py-4 text-base font-bold text-white shadow-lg transition duration-200 hover:shadow-xl hover:-translate-y-1 disabled:cursor-not-allowed disabled:from-gray-300 disabled:to-gray-300 disabled:shadow-none inline-flex items-center gap-2 group focus:outline-none focus:ring-2 focus:ring-orange-500 focus:ring-offset-2"
        [disabled]="!selectedRole()"
        (click)="continue()"
      >
        <span>Let's Get Started</span>
        <span class="text-2xl group-hover:scale-125 transition-transform"
          ><app-icon name="rocket-launch" class="h-6 w-6"></app-icon></span
        >
      </button>
    </div>
  </div>
</section>

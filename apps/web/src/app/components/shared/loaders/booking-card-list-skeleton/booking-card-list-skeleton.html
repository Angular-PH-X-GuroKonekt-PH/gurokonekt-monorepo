<div class="space-y-4">
  @for (_ of items(); track $index) {
    <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
      <div class="animate-pulse">
        <div class="flex flex-col gap-5 lg:flex-row lg:items-center lg:justify-between">
          <div class="flex items-start gap-4">
            <div class="h-16 w-16 rounded-2xl bg-slate-200"></div>

            <div class="min-w-0 space-y-3">
              <div class="h-4 w-44 rounded bg-slate-200"></div>
              <div class="h-3 w-56 rounded bg-slate-100"></div>
              <div class="h-3 w-40 rounded bg-slate-100"></div>
            </div>
          </div>

          <div class="flex flex-wrap gap-3">
            <div class="h-9 w-24 rounded-full bg-slate-100"></div>
            <div class="h-11 w-28 rounded-xl bg-slate-100"></div>
            <div class="h-11 w-32 rounded-xl bg-slate-200"></div>
          </div>
        </div>
      </div>
    </div>
  }
</div>

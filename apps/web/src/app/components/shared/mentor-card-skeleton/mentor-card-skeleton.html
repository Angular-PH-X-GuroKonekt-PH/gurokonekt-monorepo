<div class="grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-3">
  @for (_ of items(); track $index) {
  <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
    <div class="animate-pulse">
      <div class="flex items-start gap-4">
        <div class="h-16 w-16 rounded-2xl bg-slate-200"></div>

        <div class="min-w-0 flex-1 space-y-3">
          <div class="h-4 w-32 rounded bg-slate-200"></div>
          <div class="h-3 w-24 rounded bg-slate-100"></div>
          <div class="h-3 w-40 rounded bg-slate-100"></div>
          <div class="h-3 w-48 rounded bg-slate-100"></div>
        </div>

        <div class="space-y-2">
          <div class="h-5 w-14 rounded bg-slate-200"></div>
          <div class="h-3 w-12 rounded bg-slate-100"></div>
        </div>
      </div>

      <div class="mt-4 flex flex-wrap gap-2">
        @for (_ of [1, 2, 3]; track $index) {
        <div class="h-6 w-20 rounded-full bg-slate-100"></div>
        }
      </div>

      <div class="mt-4 flex flex-wrap gap-2">
        @for (_ of [1, 2]; track $index) {
        <div class="h-6 w-16 rounded-full bg-slate-100"></div>
        }
      </div>

      <div class="mt-4 space-y-2">
        <div class="h-3 w-full rounded bg-slate-100"></div>
        <div class="h-3 w-5/6 rounded bg-slate-100"></div>
      </div>

      <div class="mt-5 flex items-center justify-between border-t border-slate-100 pt-5">
        <div class="h-7 w-36 rounded-full bg-slate-100"></div>
        <div class="h-11 w-32 rounded-xl bg-slate-200"></div>
      </div>
    </div>
  </div>
  }
</div>

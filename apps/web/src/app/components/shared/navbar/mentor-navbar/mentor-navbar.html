<nav class="fixed top-0 z-50 w-full border-b border-default bg-neutral-primary-soft">
  <div class="px-3 py-3 lg:px-5 lg:pl-3">
    <div class="flex items-center justify-between">
      <div class="flex items-center justify-start rtl:justify-end">
        <button data-drawer-target="top-bar-sidebar" data-drawer-toggle="top-bar-sidebar"
          aria-controls="top-bar-sidebar" type="button"
          class="box-border rounded-base border border-transparent bg-transparent p-2 text-sm font-medium leading-5 text-heading hover:bg-neutral-secondary-medium focus:outline-none focus:ring-4 focus:ring-neutral-tertiary sm:hidden">
          <span class="sr-only">Open sidebar</span>
          <svg class="h-6 w-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h10" />
          </svg>
        </button>

        <a [routerLink]="'/mentor/dashboard'" class="flex items-center gap-3 ms-2 md:me-24">
          <div class="hidden sm:block">
            <p class="text-sm font-semibold text-heading">GuroKonekt</p>
            <p class="text-xs text-body">Mentor Workspace</p>
          </div>
        </a>       
      </div>

      <div class="flex items-center gap-3">

        <!-- Notification Bell -->
        <button id="dropdownNotificationButton" data-dropdown-toggle="dropdownNotification" class="relative inline-flex items-center text-body hover:text-heading focus:outline-none" type="button mr-8">
          <app-icon [name]="'bell'" class="h-6 w-6 transition-transform group-hover:scale-110"></app-icon>
        </button>

        <div id="dropdownNotification"
          class="z-20 hidden w-80 rounded-base border border-default-medium bg-neutral-primary-soft shadow"
          aria-labelledby="dropdownNotificationButton">
          <div class="rounded-t-base bg-neutral-secondary-medium px-4 py-2 text-center text-sm font-medium text-body">
            Notifications
          </div>
          <div class="divide-y divide-default py-2">
            <p class="px-4 py-6 text-center text-sm text-body">No notifications yet.</p>
          </div>
          <a [routerLink]="'/mentor/notifications'"
            class="block rounded-b-base bg-neutral-secondary-medium py-2 text-center text-sm font-medium text-body hover:bg-neutral-tertiary-medium">
            View all
          </a>
        </div>

        <!-- User Dropdown -->
        <div class="relative">
          <button type="button"
            class="flex rounded-full bg-gray-800 text-sm focus:ring-4 focus:ring-gray-300"
            data-dropdown-toggle="dropdown-user">
            <img class="h-8 w-8 rounded-full object-cover" [src]="userAvatarUrl()" [alt]="userFullName()" />
          </button>

          <div class="z-50 hidden w-56 rounded-base border border-default-medium bg-neutral-primary-medium shadow-lg" id="dropdown-user">
            <div class="border-b border-default-medium px-4 py-3">
              <p class="text-sm font-medium text-heading">{{ userFullName() }}</p>
              <p class="truncate text-sm text-body">{{ userEmail() }}</p>
            </div>

            <ul class="p-2 text-sm font-medium text-body">
              <li>
                <a [routerLink]="'/mentor/profile-settings'"
                  class="inline-flex w-full items-center gap-2 rounded p-2 hover:bg-neutral-tertiary-medium hover:text-heading">
                  <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                  </svg>
                  Profile Settings
                </a>
              </li>
              <li>
                <button (click)="logout()" type="button"
                  class="inline-flex w-full items-center gap-2 rounded p-2 hover:bg-neutral-tertiary-medium hover:text-heading">
                  <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                  </svg>
                  Sign out
                </button>
              </li>
            </ul>
          </div>
        </div>

      </div>
    </div>
  </div>
</nav>

<aside id="top-bar-sidebar"
  class="fixed top-0 left-0 z-50 w-64 h-full transition-transform -translate-x-full sm:translate-x-0"
  aria-label="Sidebar">
  <div class="flex h-full flex-col overflow-y-auto border-e border-default bg-neutral-primary-soft px-3 py-4">
    
    <!-- Logo -->
    <a [routerLink]="'mentee-dashboard'" class="flex items-center ps-2.5 mb-5 justify-start">
      <img src="assets/logos/logo-light.svg" class="h-12 me-1" alt="Flowbite Logo" />
      <div class="flex items-center justify-center gap-1">
        <span class="text-xl font-bold text-blue-900">Guro</span>
        <span class="text-xl font-bold text-orange-500">Konekt</span>
      </div>
    </a>

    <!-- Nav Links -->
    <ul class="space-y-2 px-4 font-medium">
      <li>
        <a [routerLink]="['/mentor/dashboard']"
          routerLinkActive="bg-orange-50 text-orange-600 border-l-4 border-orange-500"
          [routerLinkActiveOptions]="{exact: false}"
          class="flex items-center gap-3 px-4 py-3 text-gray-600 font-medium rounded-lg hover:bg-gray-50 hover:text-gray-900 transition-all group relative">
          <app-icon [name]="'chart-bar'" class="h-5 w-5 transition-transform group-hover:scale-110"></app-icon>
          <span class="truncate">Dashboard</span>
        </a>
      </li>

      <li>
        <a [routerLink]="['/mentor/my-booking']"
          routerLinkActive="bg-orange-50 text-orange-600 border-l-4 border-orange-500"
          [routerLinkActiveOptions]="{exact: false}"
          class="flex items-center gap-3 px-4 py-3 text-gray-600 font-medium rounded-lg hover:bg-gray-50 hover:text-gray-900 transition-all group relative">
          <app-icon [name]="'calendar-days'" class="h-5 w-5 transition-transform group-hover:scale-110"></app-icon>
          <span class="truncate">My Bookings</span>
        </a>
      </li>

      <li>
        <a [routerLink]="['/mentor/availability']"
          routerLinkActive="bg-orange-50 text-orange-600 border-l-4 border-orange-500"
          [routerLinkActiveOptions]="{exact: false}"
          class="flex items-center gap-3 px-4 py-3 text-gray-600 font-medium rounded-lg hover:bg-gray-50 hover:text-gray-900 transition-all group relative">
          <app-icon [name]="'check-mark-circle'" class="h-10 w-5 transition-transform group-hover:scale-110"></app-icon>
          <span class="truncate">Availability</span>
        </a>
      </li>
    </ul>

    <!-- Logout -->
    <div class="mt-auto px-4 pb-2">
      <div class="border-t border-gray-200 pt-4">
        <button type="button" (click)="logout()"
          class="flex w-full items-center gap-3 px-4 py-3 text-gray-600 font-medium rounded-lg hover:bg-gray-50 hover:text-gray-900 transition-all group">
          <app-icon [name]="'arrow-right-on-rectangle'" class="h-5 w-5 transition-transform group-hover:scale-110"></app-icon>
          <span class="truncate">Logout</span>
        </button>
      </div>
    </div>

  </div>
</aside>

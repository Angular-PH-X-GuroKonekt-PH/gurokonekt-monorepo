<button
  type="button"
  (click)="onClick()"
  class="inline-flex min-h-11 items-center justify-center gap-2 rounded-xl border px-4 py-2.5 text-sm font-semibold leading-5 shadow-xs transition-all duration-200 focus:outline-none"
  [class.text-heading]="!isActive"
  [class.bg-white]="!isActive"
  [class.border-slate-200]="!isActive"
  [class.ring-1]="!isActive"
  [class.ring-slate-100]="!isActive"
  [class.bg-brand]="isActive"
  [class.text-white]="isActive"
  [class.ring-4]="isActive"
  [class.ring-brand-subtle]="isActive"
  [class.border-brand]="isActive"
>
  {{ label() }}

<span
  class="inline-flex min-w-6 items-center justify-center rounded-full px-2 py-0.5 text-xs font-semibold 
         transition-colors duration-300 ease-in-out"
  [class.bg-orange-500]="isActive"
  [class.bg-slate-100]="!isActive"
  [class.text-white]="isActive"
  [class.text-body]="!isActive"
>
  {{ count() }}
</span>
</button>

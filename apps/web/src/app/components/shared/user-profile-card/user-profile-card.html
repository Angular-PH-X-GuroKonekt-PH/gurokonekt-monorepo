<div
  class="hidden h-full rounded-3xl border border-slate-200 bg-white p-6 shadow-[0_12px_30px_rgba(15,23,42,0.05)] sm:block">
  <div class="flex h-full flex-col justify-between">
    <div class="flex flex-col items-center text-center">
      <div
        class="mb-4 inline-flex w-full items-center justify-center rounded-3xl border border-slate-100 bg-linear-to-br from-orange-50 via-white to-blue-50 px-4 py-5">
        <img
          class="h-20 w-20 rounded-full border-4 border-white object-cover shadow-md"
          [src]="userProfile().avatarAttachments.publicUrl || 'assets/img/no_profile_avatar.png'"
          :alt="{{ userProfile().firstName }} {{ userProfile().lastName }} profile" />
      </div>

      <div class="space-y-2">
        <h5 class="text-lg font-semibold tracking-tight text-heading">
          {{ userProfile().firstName }} {{ userProfile().lastName }}
        </h5>

        <span
          class="inline-flex rounded-full border border-orange-200 bg-orange-50 px-3 py-1 text-xs font-semibold uppercase tracking-[0.08em] text-orange-700">
          {{ userProfile().role }}
        </span>
      </div>

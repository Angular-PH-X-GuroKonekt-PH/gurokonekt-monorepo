<div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-[0_12px_30px_rgba(15,23,42,0.05)]">

  <div class="flex justify-center sm:mb-4">
    <img class=" w-25 h-25 sm:w-30 sm:h-30 rounded-full object-cover"
      [src]="userProfile().avatarAttachments.publicUrl || 'assets/img/no_profile_avatar.png'"
      alt="{{ userProfile().firstName }}_{{ userProfile().lastName }}_profile" />
  </div>
  <div class="w-full flex-col justify-center sm:items-center text-center sm:text-center">

    <h5 class="text-xl font-semibold tracking-tight text-heading mb-0.5">
     {{ userProfile().firstName }} {{ userProfile().lastName }}
    </h5>

    <span class="text-sm text-body">
      {{ userProfile().email }}
    </span>

    <div class="flex flex-col items-center">

      <div class="flex mt-4 md:mt-6 gap-4">


        <a type="button" [routerLink]="'/mentee/profile-settings'"
          class=" flex items-center gap-2 w-auto text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading focus:ring-4 focus:ring-neutral-tertiary shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none">

          <app-icon name="cog-6-tooth" class="h-6 w-6"></app-icon>

          Change Profile Settings
        </a>
      </div>
    </div>
  </div>
</div>

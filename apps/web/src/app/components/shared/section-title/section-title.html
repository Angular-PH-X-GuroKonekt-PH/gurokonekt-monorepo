<div class="flex flex-col mb-5">
  <h2 class="text-2xl flex gap-2 items-center font-extrabold text-gray-600">
    {{title()}}

    @if (count()) {
    <span
      class="inline-flex min-w-7 items-center justify-center rounded-full bg-orange-100 px-2.5 py-1 text-lg font-bold text-orange-500">
      {{ count() }}
    </span>
    }

  </h2>

  @if(subtitle()){
  <p class="mt-1 text-[0.95rem] text-slate-500">{{subtitle()}}</p>
  }
</div>

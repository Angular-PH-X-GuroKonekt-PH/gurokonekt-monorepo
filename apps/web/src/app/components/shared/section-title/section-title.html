<div class="flex flex-col mb-2">
  <h2 class="text-3xl sm:text-4xl font-bold bg-linear-to-r from-blue-900 via-orange-600 to-blue-900 bg-clip-text text-transparent">
    {{title()}}

    @if (count()) {
    <span
      class="inline-flex min-w-7 items-center justify-center rounded-full bg-orange-100 px-2.5 py-1 text-lg font-bold text-orange-500">
      {{ count() }}
    </span>
    }

  </h2>

  @if(subtitle()){
  <p class="mt-3 text-base text-gray-700">{{subtitle()}}</p>
  }

</div>

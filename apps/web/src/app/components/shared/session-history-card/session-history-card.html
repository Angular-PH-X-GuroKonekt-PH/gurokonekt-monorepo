<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    @if (completedSessions().length === 0) {
    <div class="rounded-2xl border border-default bg-white p-4 text-sm text-body">
        No bookings found.
    </div>
    } @else {

    @for (session of completedSessions(); track $index) {
    <div
        class="group w-full rounded-3xl border bg-white p-5 text-left  transition duration-300   flex flex-col h-full focus:outline-none focus:ring-2 focus:ring-gray-300 focus:ring-offset-2 border-blue-100 bg-linear-to-br from-white to-blue-50 hover:ring-2   hover:ring-offset-2 hover:ring-blue-300 ">
        <!-- Header -->
        <div class="flex items-start justify-between gap-4 mb-4">
            <div class="flex items-start gap-3"> <img class="w-16 h-16 rounded-2xl object-cover"
                    [src]="session.mentorProfilePicture || 'assets/img/no_profile_avatar.png'" alt="Profile">
                <div class="flex flex-col gap-2">

                    <p class="text-base font-semibold text-gray-900">Session with {{ session.mentorName }} </p>

                    <span class="inline-flex text-sm  text-body items-center gap-1.5">
                        <app-icon name="calendar-days" class="h-4 w-4 text-orange-500"></app-icon>
                        {{ session.sessionDateTime | date: 'MMM d, y, h:mm a z' }}
                    </span>
                    <app-session-badge [status]="session.status"></app-session-badge>

                </div>
            </div>

            <!-- Rating -->
            @if(!session.sessionRating){
            <app-star-rating [rating]="0" />
            }@else{
            <app-star-rating [rating]="session.sessionRating" />
            }

        </div>

        @if(!session.sessionRating){
        <div class="flex justify-end items-center ">
            <button type="button"
                class="inline-flex min-h-11 w-full items-center justify-center gap-2 rounded-xl border border-orange-200 bg-white px-5 py-3 font-semibold text-orange-500 shadow-sm ring-1 ring-orange-100 transition-all duration-200 hover:-translate-y-0.5 hover:border-orange-300 hover:bg-orange-50 hover:ring-2 hover:ring-orange-200 sm:w-auto">
                <app-icon name="star" class="h-5 w-5 text-orange-500"></app-icon>
                Add Rating
            </button>
        </div>
        }






    </div>
    }

    }

</div>

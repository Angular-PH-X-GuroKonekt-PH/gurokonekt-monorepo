@if (message) {
  <div 
    [class]="getAlertClasses()"
    role="alert"
    [attr.aria-live]="type === 'error' ? 'assertive' : 'polite'"
  >
    <div class="flex items-start gap-3">
      <div class="flex-shrink-0 mt-0.5">
        <app-icon [name]="getAlertIconName()" [class]="getIconClasses()"></app-icon>
      </div>
      <div class="flex-1">
        <div class="flex items-center gap-2">
          <span [class]="getTitleClasses()">{{ getTitle() }}</span>
        </div>
        <p [class]="getMessageClasses()">
          {{ message }}
        </p>
      </div>
      @if (dismissible) {
        <button 
          type="button" 
          class="ml-auto -mx-1.5 -my-1.5 rounded-lg focus:ring-2 p-1.5 inline-flex h-8 w-8 items-center justify-center"
          [class]="getDismissButtonClasses()"
          (click)="dismiss()"
          aria-label="Close alert"
        >
          <app-icon name="close" class="w-3 h-3"></app-icon>
        </button>
      }
    </div>
  </div>
}

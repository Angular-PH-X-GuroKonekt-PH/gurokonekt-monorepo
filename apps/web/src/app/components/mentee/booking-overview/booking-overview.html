    <app-section-card>
      @if (isBookingsLoading()) {
        <div class="space-y-4">
          <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div class="space-y-1">
              <div class="h-8 w-64 animate-pulse rounded bg-slate-200"></div>
              <div class="h-5 w-72 animate-pulse rounded bg-slate-100"></div>
            </div>

            <div class="flex flex-wrap items-center gap-3">
              @for (chip of [1, 2, 3, 4, 5, 6]; track chip) {
                <div class="h-11 w-24 animate-pulse rounded-base bg-slate-100"></div>
              }
            </div>
          </div>

          <!-- @for (skeleton of [1, 2, 3]; track skeleton) {

                    <div class="space-y-3">

          <app-loading-card [message]="'Loading bookings...'"></app-loading-card>

        </div>

      } @else {
        <div class="space-y-4">
          <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <app-section-title
              title="Manage Your Bookings"
              subtitle="Stay organized with all your mentorship sessions."
            />

            <div class="rounded-2xl bg-slate-100/80 p-1.5">
              <div class="flex flex-wrap items-center gap-1.5">
                <app-filter-button
                  label="All"
                  value="ALL"
                  [count]="bookingCounts().ALL"
                  [selectedValue]="selectedFilter()"
                  (clicked)="setFilter($event)"
                />

                <app-filter-button
                  label="Upcoming"
                  [value]="bookingStatus.APPROVED"
                  [count]="bookingCounts().UPCOMING"
                  [selectedValue]="selectedFilter()"
                  (clicked)="setFilter($event)"
                />

                <app-filter-button
                  label="Pending"
                  [value]="bookingStatus.PENDING"
                  [count]="bookingCounts().PENDING"
                  [selectedValue]="selectedFilter()"
                  (clicked)="setFilter($event)"
                />

                <app-filter-button
                  label="Cancelled"
                  [value]="bookingStatus.CANCELLED"
                  [count]="bookingCounts().CANCELLED"
                  [selectedValue]="selectedFilter()"
                  (clicked)="setFilter($event)"
                />

                <app-filter-button
                  label="Rejected"
                  [value]="bookingStatus.REJECTED"
                  [count]="bookingCounts().REJECTED"
                  [selectedValue]="selectedFilter()"
                  (clicked)="setFilter($event)"
                />

                <app-filter-button
                  label="Completed"
                  [value]="bookingStatus.COMPLETED"
                  [count]="bookingCounts().COMPLETED"
                  [selectedValue]="selectedFilter()"
                  (clicked)="setFilter($event)"
                />
              </div>
            </div>
          </div>

          <app-session-booking-card
            [bookingList]="displayedBookings()"
            (viewDetails)="onViewDetails($event)"
            (cancelRequest)="onCancelRequest($event)"
            (addReview)="onAddReview($event)"
            [emptyTitle]="selectedFilter() === 'ALL' ? 'No bookings yet' : 'No bookings match this filter'"
            [emptyMessage]="selectedFilter() === 'ALL'
              ? 'You do not have any bookings at the moment. Once you schedule a mentoring session, it will appear here.'
              : 'Try choosing another booking status or clearing the filter to see more sessions.'"
          />
        </div>
      }
    </app-section-card>
  </section>
</div>

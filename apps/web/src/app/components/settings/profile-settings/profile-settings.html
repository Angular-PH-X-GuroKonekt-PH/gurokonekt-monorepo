<section class="min-h-screen bg-gray-50">
  <div class="mx-auto max-w-6xl px-4 py-10 sm:px-6 lg:px-8">
    <header class="mb-6">
      <p class="text-xs font-semibold uppercase tracking-wide text-orange-600">Profile Settings</p>
      <h1 class="mt-1 text-3xl font-bold text-gray-900">Manage Your Profile</h1>
      <p class="mt-2 text-sm text-gray-600">
        Configure your account details and update your mentor profile information.
      </p>
    </header>

    <div class="grid gap-6 lg:grid-cols-[240px_1fr]">
      <aside class="rounded-2xl border border-gray-200 bg-white p-3 shadow-sm">
        <a
          [routerLink]="overviewRoute"
          routerLinkActive="bg-orange-50 text-orange-700"
          class="block rounded-xl px-4 py-3 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-100"
        >
          Overview Section
        </a>
      </aside>

      <div class="rounded-2xl border border-gray-200 bg-white p-4 shadow-sm sm:p-6">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</section>

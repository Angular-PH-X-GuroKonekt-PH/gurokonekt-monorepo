<div class="min-h-screen bg-gray-50">
  <!-- Sidebar -->
  @if (showSidebar()) {
    <app-sidebar></app-sidebar>
  }

  <!-- Top bar -->
  @if (showSidebar()) {
  <header class="border-b border-gray-200 bg-white shadow-sm sticky top-0 z-50">
		<div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
			<div class="flex h-20 items-center justify-between">
				<!-- Logo and Branding -->
				<div class="flex items-center gap-3">
					<!-- Logo SVG from logo-light.svg -->
					<svg class="h-12 w-12" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 375" fill="none">
						<circle cx="104" cy="86" r="48" fill="#ff751f" fill-opacity="0.8"/>
						<circle cx="277" cy="252" r="42" fill="#ff751f" fill-opacity="0.5"/>
						<circle cx="230" cy="84" r="22" fill="#1800ad"/>
						<circle cx="92" cy="202" r="22" fill="#1800ad"/>
						<circle cx="104" cy="310" r="22" fill="#1800ad"/>
						<path fill="#000000" d="M 242.539062 222.050781 C 244.875 219.230469 244.480469 215.058594 241.660156 212.726562 L 221.539062 196.0625 C 223.496094 192.078125 224.625 187.613281 224.625 182.882812 C 224.625 172.160156 218.957031 162.761719 210.480469 157.449219 L 224.277344 116.597656 C 225.449219 113.132812 223.585938 109.375 220.117188 108.203125 C 216.644531 107.03125 212.890625 108.890625 211.722656 112.359375 L 197.980469 153.0625 C 196.871094 152.9375 195.746094 152.859375 194.601562 152.859375 C 188.949219 152.859375 183.671875 154.460938 179.148438 157.191406 L 153.914062 126.226562 C 151.597656 123.390625 147.425781 122.964844 144.589844 125.273438 C 141.753906 127.585938 141.332031 131.761719 143.640625 134.597656 L 169.542969 166.382812 C 166.671875 170.722656 164.929688 175.847656 164.652344 181.359375 L 123.1875 190.507812 C 119.613281 191.292969 117.355469 194.832031 118.144531 198.402344 C 118.828125 201.496094 121.566406 203.601562 124.609375 203.601562 C 125.082031 203.601562 125.5625 203.550781 126.042969 203.445312 L 166.894531 194.433594 C 168.722656 198.792969 171.554688 202.625 175.089844 205.660156 L 119.339844 279.160156 C 117.125 282.078125 117.695312 286.234375 120.613281 288.445312 C 121.808594 289.351562 123.21875 289.792969 124.613281 289.792969 C 126.613281 289.792969 128.59375 288.890625 129.894531 287.171875 L 186.992188 211.898438 C 189.429688 212.535156 191.96875 212.910156 194.601562 212.910156 C 201.644531 212.910156 208.109375 210.457031 213.234375 206.386719 L 233.214844 222.929688 C 234.449219 223.957031 235.945312 224.453125 237.433594 224.453125 C 239.339844 224.453125 241.230469 223.632812 242.539062 222.050781 Z M 194.601562 199.65625 C 185.355469 199.65625 177.832031 192.132812 177.832031 182.882812 C 177.832031 173.632812 185.355469 166.113281 194.601562 166.113281 C 203.847656 166.113281 211.375 173.632812 211.375 182.882812 C 211.375 192.132812 203.847656 199.65625 194.601562 199.65625 Z" fill-opacity="0.9"/>
					</svg>
					<!-- Brand Text -->
					<div class="flex items-baseline">
						<span class="text-2xl font-bold text-blue-900">Guro</span>
						<span class="text-2xl font-bold text-orange-500">Konekt</span>
					</div>
				</div>

				<!-- Right side: Notifications & Profile -->
				<div class="flex items-center gap-4">
					<!-- Notification Bell -->
					<button class="relative rounded-lg p-2 text-gray-600 hover:bg-gray-100 transition-colors">
						<svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
							<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
						</svg>
						<span class="absolute top-1.5 right-1.5 flex h-2 w-2">
							<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
							<span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
						</span>
					</button>

					<!-- Profile Menu -->
					<button class="flex items-center gap-2 rounded-lg px-2 py-1.5 hover:bg-gray-100 transition-colors">
						<div class="h-9 w-9 rounded-full bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center text-white font-semibold text-sm">
							{{ menteeName.charAt(0) }}
						</div>
						<svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
							<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
						</svg>
					</button>
				</div>
			</div>
		</div>
	</header>
  }
  
  <!-- Routed pages -->
  <main [class.pt-0]="!showSidebar()" [class.pl-20]="showSidebar()" [class.lg:pl-64]="showSidebar()" class="pt-0 transition-all duration-300">
    <router-outlet></router-outlet>
  </main>
</div>

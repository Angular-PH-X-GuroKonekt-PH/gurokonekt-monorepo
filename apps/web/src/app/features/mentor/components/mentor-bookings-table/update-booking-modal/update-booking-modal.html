<div class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/50 p-4">
    <div class="relative w-full max-w-md rounded-lg bg-white shadow">
        <div class="flex items-center justify-between border-b border-gray-200 p-4">
            <h3 class="text-lg font-semibold text-gray-900">Update Booking</h3>

            <button type="button" (click)="closed.emit()"
                class="ms-auto inline-flex h-10 w-10 items-center justify-center rounded-lg bg-transparent text-lg text-gray-400 hover:bg-gray-200 hover:text-gray-900">
                &times;
            </button>
        </div>

        <div class="space-y-4 p-4">
            <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                <div>
                    <label for="update-session-date" class="mb-2 block text-sm font-medium text-gray-900">
                        Session date
                    </label>

                    <input id="update-session-date" type="date" [ngModel]="sessionDate()"
                        (ngModelChange)="sessionDate.set($event)"
                        class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-orange-500 focus:ring-orange-500" />
                </div>

                <div>
                    <label for="update-session-time" class="block mb-2 text-sm font-medium text-heading">
                        Select time:
                    </label>

                    <div class="relative">
                        <div class="absolute inset-y-0 end-0 top-0 flex items-center pe-3.5 pointer-events-none">
                            <svg class="w-4 h-4 text-body" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                                width="24" height="24" fill="none" viewBox="0 0 24 24">
                                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                    stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                            </svg>
                        </div>

                        <input type="time" id="update-session-time" [ngModel]="sessionTime()"
                            (ngModelChange)="sessionTime.set($event)"
                            class="block w-full p-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body"
                            min="09:00" max="18:00" required />
                    </div>
                </div>
            </div>

            <div>
                <label for="update-session-link" class="mb-2 block text-sm font-medium text-gray-900">
                    Session link
                </label>

                <input id="update-session-link" type="url" [ngModel]="sessionLink()"
                    (ngModelChange)="sessionLink.set($event)" placeholder="https://meet.google.com/..."
                    class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-orange-500 focus:ring-orange-500" />
            </div>

            <div>
                <label for="update-notes" class="mb-2 block text-sm font-medium text-gray-900">
                    Notes
                </label>

                <textarea id="update-notes" rows="3" [ngModel]="notes()" (ngModelChange)="notes.set($event)"
                    class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-orange-500 focus:ring-orange-500"></textarea>
            </div>
        </div>

        <div class="flex items-center justify-end gap-3 border-t border-gray-200 p-4">
            <button type="button" (click)="closed.emit()"
                class="rounded-lg border border-gray-200 bg-white px-5 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-100">
                Cancel
            </button>

            <button type="button" (click)="confirmed.emit()" [disabled]="submitting()"
                class="relative overflow-hidden rounded-lg bg-orange-500 px-5 py-2.5 text-sm font-medium text-white hover:bg-orange-600 disabled:cursor-not-allowed">
                <span [class.opacity-0]="submitting()">Update</span>

                @if (submitting()) {
                <span class="absolute inset-0 z-10 flex items-center justify-center bg-gray-300/30">
                    <span
                        class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"></span>
                </span>
                }
            </button>
        </div>
    </div>
</div>

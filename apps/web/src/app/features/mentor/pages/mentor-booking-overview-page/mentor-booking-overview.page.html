<div class="mt-6 space-y-4">
    <div>
        <app-section-title
          title="Booking Management"
          subtitle="Track your upcoming mentorship sessions and review new requests from mentees"
        />        
    </div>
    <div>
        <app-mentor-bookings-table
          title="Recent Bookings"
          [tabs]="bookingTabs"
          footerMode="pagination"
          [bookings]="mentorBookings.bookings()"
          [isLoading]="mentorBookings.isBookingsLoading()"
          [currentPage]="mentorBookings.currentPage()"
          [pageSize]="mentorBookings.pageSize()"
          [totalItems]="mentorBookings.totalBookings()"
          (pageChange)="mentorBookings.setPage($event)"
          (pageSizeChange)="mentorBookings.setPageSize($event)"
          (tabChange)="mentorBookings.setActiveTab($event)"
        />
    </div>
</div>

<app-profile-setup-shell
  title="Complete Your Mentor Profile"
  subtitle="Set up your public mentor profile to access your mentor dashboard"
>
  <app-profile-setup-stepper
    [stepTitles]="stepTitles"
    [currentStep]="currentStep()"
  />

  <div class="bg-white rounded-3xl shadow-xl border-2 border-gray-100 p-8 sm:p-12">
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
      @if (currentStep() === 1) {
        <div class="space-y-8">
          <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-900">Build Your Mentor Presence</h2>
            <p class="text-gray-600 mt-2">Add your professional bio and profile photo</p>
          </div>

          <app-profile-setup-avatar
            [previewUrl]="avatarPreview()"
            [error]="avatarError()"
            buttonLabel="Upload Profile Picture"
            (fileSelected)="onAvatarSelected($event)"
            (removed)="removeAvatar($event)"
          />

          <app-profile-setup-bio
            [form]="profileForm"
            label="Professional Bio"
            placeholder="Introduce your experience, mentorship approach, and what mentees can expect from your sessions."
          />

          <app-profile-setup-step-nav
            [currentStep]="currentStep()"
            [totalSteps]="totalSteps"
            [canProceed]="canProceedToNextStep()"
            [isLoading]="isSubmitting()"
            (next)="nextStep()"
            (previous)="previousStep()"
          />
        </div>
      }

      @if (currentStep() === 2) {
        <div class="space-y-8">
          <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-900">Topics and Skills</h2>
            <p class="text-gray-600 mt-2">
              Choose mentorship topics and list additional skills you can teach
            </p>
          </div>

          <app-profile-setup-option-chips
            label="Topics of Mentorship"
            description="Select one or more expertise areas"
            [options]="expertiseOptions"
            [selectedCount]="areasOfExpertise.length"
            emptyError="Please select at least one mentorship topic"
            [showSelectedCount]="false"
            [isSelected]="isExpertiseSelected"
            (toggled)="toggleExpertise($event)"
          />

          <app-form-array-text-list
            [formArray]="skills"
            listId="additional-skill"
            label="Additional Skills"
            description="Add specific skills you can mentor (max 8)"
            addButtonLabel="Add Skill"
            itemSingularLabel="skill"
            [maxItems]="maxSkills"
            placeholder="E.g., CV review, React architecture, interview coaching"
            helperText="Type a skill and press Enter or click + to add another. Each skill needs at least 2 characters."
          />

          <app-profile-setup-step-nav
            [currentStep]="currentStep()"
            [totalSteps]="totalSteps"
            [canProceed]="canProceedToNextStep()"
            [isLoading]="isSubmitting()"
            (next)="nextStep()"
            (previous)="previousStep()"
          />
        </div>
      }

      @if (currentStep() === 3) {
        <div class="space-y-8">
          <app-mentor-weekly-availability
            (availabilityChange)="availability.set($event)"
          />

          <app-profile-setup-step-nav
            [currentStep]="currentStep()"
            [totalSteps]="totalSteps"
            [canProceed]="canProceedToNextStep()"
            [isLoading]="isSubmitting()"
            (next)="nextStep()"
            (previous)="previousStep()"
          />
        </div>
      }
    </form>
  </div>
</app-profile-setup-shell>

<app-profile-setup-shell
  title="Complete Your Profile"
  subtitle="Let's set up your mentee profile to get you started"
>
  <app-profile-setup-stepper
    [stepTitles]="stepTitles"
    [currentStep]="currentStep()"
  />

  <div class="bg-white rounded-3xl shadow-xl border-2 border-gray-100 p-8 sm:p-12">
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
      @if (currentStep() === 1) {
        <div class="space-y-8">
          <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-900">Tell Us About Yourself</h2>
            <p class="text-gray-600 mt-2">
              Share a bit about who you are and upload a profile picture
            </p>
          </div>

          <app-profile-setup-avatar
            [previewUrl]="avatarPreview()"
            [error]="avatarError()"
            buttonLabel="Choose Profile Picture"
            (fileSelected)="onAvatarSelected($event)"
            (removed)="removeAvatar($event)"
          />

          <app-profile-setup-bio
            [form]="profileForm"
            label="Short Bio"
            placeholder="Tell us about yourself, your background, and what you're looking to achieve through mentorship..."
          />

          <app-profile-setup-step-nav
            [currentStep]="currentStep()"
            [totalSteps]="totalSteps"
            [canProceed]="canProceedToNextStep()"
            [isLoading]="isSubmitting()"
            (next)="nextStep()"
            (previous)="previousStep()"
          />
        </div>
      }

      @if (currentStep() === 2) {
        <div class="space-y-8">
          <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-900">Your Learning Journey</h2>
            <p class="text-gray-600 mt-2">
              Define your goals and interests to match with the right mentors
            </p>
          </div>

          <app-form-array-text-list
            [formArray]="learningGoals"
            listId="learning-goal"
            label="Learning Goals"
            description="What do you want to achieve? (Add at least 1, max 5)"
            addButtonLabel="Add Goal"
            itemSingularLabel="goal"
            [maxItems]="maxLearningGoals"
            placeholder="E.g., Learn web development fundamentals"
            helperText="Type a goal and press Enter or click + to add another. Each goal needs at least 2 characters."
          />

          <app-profile-setup-option-chips
            label="Areas of Interest"
            description="Select up to 5 areas you're interested in"
            [options]="areasOfInterestOptions"
            [selectedCount]="areasOfInterest.length"
            [maxItems]="maxAreasOfInterest"
            emptyError="Please select at least one area of interest"
            [isSelected]="isAreaSelected"
            (toggled)="toggleAreaOfInterest($event)"
          />

          <app-profile-setup-session-type
            [selectedCount]="preferredSessionTypes.length"
            [isSelected]="isSessionTypeSelected"
            (toggled)="toggleSessionType($event)"
          />

          <app-profile-setup-step-nav
            [currentStep]="currentStep()"
            [totalSteps]="totalSteps"
            [canProceed]="canProceedToNextStep()"
            [isLoading]="isSubmitting()"
            (next)="nextStep()"
            (previous)="previousStep()"
          />
        </div>
      }
    </form>
  </div>
</app-profile-setup-shell>

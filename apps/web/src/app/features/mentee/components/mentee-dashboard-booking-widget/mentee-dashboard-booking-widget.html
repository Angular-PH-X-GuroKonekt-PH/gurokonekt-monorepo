<article
  class="flex h-full min-h-80 flex-col overflow-hidden rounded-3xl border border-slate-200/80 bg-white shadow-[0_16px_40px_rgba(15,23,42,0.06)]"
>
  <header class="flex items-start justify-between gap-4 border-b border-slate-100 px-5 py-5 sm:px-6">
    <div class="min-w-0">
      <div class="flex items-center gap-2">
        <h2 class="truncate text-lg font-bold text-blue-950">{{ title() }}</h2>
        <span class="rounded-full bg-blue-50 px-2.5 py-1 text-xs font-bold text-blue-900">
          {{ totalCount() }}
        </span>
      </div>
      <p class="mt-1 text-sm text-slate-500">{{ subtitle() }}</p>
    </div>

    <button
      type="button"
      (click)="viewAll.emit()"
      class="inline-flex shrink-0 items-center gap-1 text-sm font-semibold text-orange-600 transition hover:text-orange-700"
    >
      View all
      <app-icon name="chevron-right" class="h-4 w-4" />
    </button>
  </header>

  <div class="flex flex-1 flex-col px-5 sm:px-6">
    @if (loading()) {
      <div class="divide-y divide-slate-100" aria-label="Loading sessions">
        @for (item of [1, 2, 3]; track item) {
          <div class="flex animate-pulse items-center gap-3 py-4">
            <div class="h-11 w-11 shrink-0 rounded-full bg-slate-200"></div>
            <div class="min-w-0 flex-1 space-y-2">
              <div class="h-3.5 w-2/5 rounded bg-slate-200"></div>
              <div class="h-3 w-3/5 rounded bg-slate-100"></div>
            </div>
            <div class="h-6 w-20 rounded-full bg-slate-100"></div>
          </div>
        }
      </div>
    } @else if (bookings().length > 0) {
      <div class="divide-y divide-slate-100">
        @for (booking of bookings(); track booking.id) {
          <button
            type="button"
            (click)="viewDetails.emit(booking)"
            class="group grid w-full grid-cols-[auto_minmax(0,1fr)_auto] items-center gap-3 py-4 text-left"
          >
            <img
              [src]="booking.mentor?.avatarAttachments?.[0]?.publicUrl || 'assets/img/no_profile_avatar.png'"
              [alt]="booking.mentor ? booking.mentor.firstName + ' ' + booking.mentor.lastName : 'Mentor'"
              class="h-11 w-11 rounded-full border border-slate-200 object-cover"
            />

            <div class="min-w-0">
              <p class="truncate text-sm font-bold text-blue-950 group-hover:text-orange-600">
                @if (booking.mentor) {
                  {{ booking.mentor.firstName }} {{ booking.mentor.lastName }}
                } @else {
                  Unknown Mentor
                }
              </p>
              <p class="mt-1 flex flex-wrap items-center gap-x-2 gap-y-1 text-xs text-slate-500">
                <span>{{ booking.sessionDateTime | date: 'MMM d, y' }}</span>
                <span aria-hidden="true">&bull;</span>
                <span>{{ booking.sessionDateTime | date: 'h:mm a' }}</span>
              </p>
            </div>

            <div class="flex items-center gap-2">
              <app-session-badge [status]="booking.status" />
              <app-icon
                name="chevron-right"
                class="h-4 w-4 text-slate-300 transition group-hover:translate-x-0.5 group-hover:text-orange-500"
              />
            </div>
          </button>
        }
      </div>
    } @else {
      <div class="flex flex-1 flex-col items-center justify-center px-4 py-10 text-center">
        <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-orange-50">
          <app-icon
            [name]="mode() === 'upcoming' ? 'calendar-days' : 'clock'"
            class="h-6 w-6 text-orange-500"
          />
        </div>
        <h3 class="mt-4 text-sm font-bold text-blue-950">{{ emptyTitle() }}</h3>
        <p class="mt-1 max-w-xs text-xs leading-5 text-slate-500">{{ emptyMessage() }}</p>
      </div>
    }
  </div>
</article>

<div class="grid grid-cols-1 gap-8 sm:grid-cols-2 md:grid-cols-3">
  @for (_ of items(); track $index) {
    <div
      class="flex h-full flex-col overflow-hidden rounded-[1.75rem] border border-blue-100/80 bg-white p-5 shadow-[0_18px_50px_rgba(30,64,175,0.08)]"
    >
      <div class="animate-pulse">
        <div class="flex items-start gap-4">
          <div class="h-18 w-18 shrink-0 rounded-2xl bg-slate-200"></div>

          <div class="min-w-0 flex-1">
            <div class="h-5 w-40 rounded bg-slate-200"></div>
            <div class="mt-2 h-4 w-32 rounded bg-slate-100"></div>
            <div class="mt-2 h-4 w-full rounded bg-slate-100"></div>
            <div class="mt-1 h-4 w-4/5 rounded bg-slate-100"></div>
          </div>
        </div>

        <div class="mt-5 flex flex-wrap gap-2">
          @for (_ of [1, 2, 3]; track $index) {
            <div class="h-7 w-24 rounded-lg bg-indigo-50"></div>
          }
        </div>

        <div class="mt-4 grid grid-cols-2 gap-3">
          <div class="rounded-2xl bg-slate-50 px-4 py-3.5">
            <div class="h-3 w-24 rounded bg-slate-200"></div>
            <div class="mt-3 h-4 w-20 rounded bg-slate-200"></div>
          </div>

          <div class="rounded-2xl bg-slate-50 px-4 py-3.5">
            <div class="h-3 w-24 rounded bg-slate-200"></div>
            <div class="mt-3 h-4 w-20 rounded bg-slate-200"></div>
          </div>
        </div>

        <div class="mt-4 border-t border-slate-100 pt-4">
          <div class="flex min-h-12 items-start justify-between gap-6">
            <div class="min-w-0 flex-1">
              <div class="h-3 w-28 rounded bg-slate-200"></div>
              <div class="mt-2 flex items-center gap-2">
                <div class="h-4 w-40 rounded bg-slate-100"></div>
                <div class="h-5 w-14 rounded-full bg-emerald-50"></div>
              </div>
            </div>

            <div class="shrink-0">
              <div class="ml-auto h-3 w-12 rounded bg-slate-200"></div>
              <div class="mt-2 h-5 w-28 rounded bg-slate-200"></div>
            </div>
          </div>

          <div class="mt-5 h-12 w-full rounded-2xl bg-orange-100"></div>
        </div>
      </div>
    </div>
  }
</div>

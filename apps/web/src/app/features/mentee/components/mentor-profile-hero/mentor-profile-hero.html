<section
  class="relative overflow-hidden rounded-4xl bg-linear-to-br from-blue-950 via-blue-900 to-blue-950 p-6 text-white shadow-[0_24px_70px_rgba(15,23,42,0.24)] md:p-8"
>
  <div
    class="pointer-events-none absolute -right-24 -top-28 h-72 w-72 rounded-full bg-orange-500/10 blur-sm"
  ></div>
  <div
    class="pointer-events-none absolute bottom-0 right-20 h-40 w-40 rounded-full bg-white/5 blur-2xl"
  ></div>

  <div class="relative flex flex-col gap-7 lg:flex-row lg:items-center lg:justify-between">
    <div class="flex flex-col gap-6 sm:flex-row sm:items-center">
      <img
        [src]="getMentorAvatarUrl()"
        [alt]="mentorFullName()"
        class="h-32 w-32 rounded-[1.75rem] object-cover ring-4 ring-white/15 md:h-36 md:w-36"
      />

      <div>
        <h1 class="mt-4 text-3xl font-bold tracking-tight text-white md:text-4xl">
          {{ mentorFullName() }}
        </h1>
        <p class="mt-2 text-base font-medium text-blue-100">
          {{ getMentorTitle() }}
        </p>

        <div class="mt-5 flex flex-wrap gap-3">
          <!-- <span
            class="inline-flex items-center gap-2 rounded-full bg-white/10 px-4 py-2 text-sm font-semibold text-white ring-1 ring-white/10"
          >
            <app-icon name="user" class="h-4 w-4 text-orange-200"></app-icon>
            Mentor
          </span> -->

          @if (mentorProfile().linkedInUrl) {
          <a
            [href]="mentorProfile().linkedInUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="inline-flex items-center gap-2 rounded-full bg-white/10 px-4 py-2 text-sm font-semibold text-white ring-1 ring-white/10 transition hover:bg-white/15"
          >
            <app-icon name="arrow-long-right" class="h-4 w-4 text-orange-200"></app-icon>
            LinkedIn
          </a>
          }
        </div>
      </div>
    </div>

    <div class="hidden md:flex md:shrink-0 md:items-center md:justify-center">
      <div class="flex h-30 w-30 items-center justify-center rounded-[2.5rem]  lg:h-45 lg:w-45 lg:p-10">
        <img
          src="assets/logos/logo.svg"
          alt="GuroKonekt logo"
          class="max-h-full max-w-full object-contain opacity-70"
        />
      </div>
    </div>
  </div>
</section>

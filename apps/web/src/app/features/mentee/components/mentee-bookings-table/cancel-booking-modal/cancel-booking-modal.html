<div class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/50 p-4"
  role="dialog" aria-modal="true" aria-labelledby="cancel-booking-title">
  <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-2xl">
    <div class="flex h-12 w-12 items-center justify-center rounded-full bg-red-50 text-2xl text-red-600">!</div>
    <h2 id="cancel-booking-title" class="mt-4 text-xl font-bold text-gray-900">Cancel booking request?</h2>
    <p class="mt-2 text-sm leading-6 text-gray-600">
      This will cancel your pending session request with
      <span class="font-semibold text-gray-900">
        {{ booking().mentor?.firstName || 'the mentor' }} {{ booking().mentor?.lastName || '' }}
      </span>.
    </p>

    <div class="mt-6 flex justify-end gap-3">
      <button type="button" (click)="closed.emit()" [disabled]="submitting()"
        class="rounded-xl border border-gray-200 px-4 py-2.5 text-sm font-semibold text-gray-700 transition hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-50">
        Keep booking
      </button>
      <button type="button" (click)="confirmed.emit()" [disabled]="submitting()"
        class="rounded-xl bg-red-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-red-700 disabled:cursor-not-allowed disabled:opacity-50">
        {{ submitting() ? 'Cancelling...' : 'Cancel request' }}
      </button>
    </div>
  </div>
</div>
